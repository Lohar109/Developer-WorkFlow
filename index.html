<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Work-Flow</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <script>
        // Apply theme immediately
        const globalSettings = JSON.parse(localStorage.getItem('devfocus-settings')) || {};
        if (globalSettings.theme) {
            document.documentElement.setAttribute('data-theme', globalSettings.theme);
        }
    </script>
    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>DevFocus</h3>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li class="active"><a href="index.html">Dashboard</a></li>
                    <li><a href="analytics.html">Analytics</a></li>
                    <li><a href="settings.html">Settings</a></li>
                    <li><a href="profile.html">Profile</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Dashboard Content -->
        <main class="main-content">
            <header class="main-header">
                <div id="headerProfilePic" class="header-profile-pic">
                    <!-- Populated by JS -->
                </div>
                <div class="main-header-text">
                    <h1 id="welcomeHeader">Welcome, Developer!</h1>
                    <p>Stay focused and track your progress.</p>
                </div>
            </header>

            <div class="widgets-grid">
                <!-- Progress Visualization -->
                <section class="widget-card card-progress">
                    <h2>Overall Progress</h2>
                    <div class="progress-bar-container">
                        <div id="progressBar" class="progress-bar-fill"></div>
                    </div>
                    <p id="progressText">0% Complete</p>
                </section>

                <!-- Daily Task Tracker -->
                <section class="widget-card card-tasks">
                    <h2>Daily Task Tracker</h2>
                    <form id="taskForm">
                        <input type="text" id="taskInput" placeholder="Add a new task..." required>
                        <input type="file" id="fileInput" style="display: none;">
                        <label for="fileInput" class="file-label" title="Attach a file"><img src="attach-file.png" alt="Attach File"></label>
                        <button type="submit">Add</button>
                    </form>
                    <p id="fileNameDisplay"></p>
                    <ul id="taskList">
                        <!-- Tasks will be dynamically inserted here -->
                    </ul>
                </section>

                <!-- Pending Tasks -->
                <section class="widget-card card-pending">
                    <h2>Pending Tasks</h2>
                    <ul id="pendingTaskList">
                        <!-- Pending tasks will be dynamically inserted here -->
                    </ul>
                </section>

                <!-- Resource Section -->
                <section class="widget-card card-resources">
                    <h2>Resource Links</h2>
                    <form id="resourceForm">
                        <input type="text" id="resourceTitleInput" placeholder="Link Title" required>
                        <input type="url" id="resourceUrlInput" placeholder="https://example.com" required>
                        <button type="submit">Add Link</button>
                    </form>
                    <ul id="resourceList">
                        <!-- Resources will be dynamically inserted here -->
                    </ul>
                </section>

                <!-- Note-taking Area -->
                <section class="widget-card card-notes">
                    <h2>Quick Notes</h2>
                    <textarea id="notesArea" placeholder="Jot down your thoughts..."></textarea>
                </section>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
